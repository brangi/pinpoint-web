<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#3B82F6" />
<title>Pinpoint — Trip</title>

<script>
  (function () {
    try {
      var saved = localStorage.getItem('pinpoint-theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var dark = saved ? saved === 'dark' : prefersDark;
      if (dark) document.documentElement.classList.add('dark');
    } catch (_) {}
  })();
</script>

<link rel="icon" type="image/svg+xml" href="assets/logo.svg" />

<link rel="preconnect" href="https://api.fontshare.com" />
<link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<link rel="stylesheet" href="dist/styles.css" />
</head>
<body class="hero-bg-pattern">

<!-- Map (only shown when ?route= present) -->
<div id="map-container" class="fixed inset-0 z-0 hidden">
  <div id="map" class="w-full h-full"></div>
</div>

<!-- Top bar (visible on every state) -->
<header class="fixed top-0 inset-x-0 z-[1000] flex items-center justify-between px-4 sm:px-6 pt-4 pointer-events-none">
  <a href="https://pinpointapp.me" class="pointer-events-auto inline-flex items-center gap-2 px-3 py-1.5 rounded-full glass-card">
    <img src="assets/logo.svg" alt="Pinpoint" class="h-6 w-6 dark:hidden" />
    <img src="assets/logo-white.svg" alt="Pinpoint" class="h-6 w-6 hidden dark:block" />
    <span class="font-display font-semibold text-sm tracking-tight">Pinpoint</span>
  </a>

  <button id="theme-toggle" aria-label="Toggle dark mode"
          class="pointer-events-auto w-10 h-10 rounded-full glass-card flex items-center justify-center text-gray-700 dark:text-gray-100 hover:scale-105 transition-transform">
    <svg class="w-5 h-5 hidden dark:block" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <svg class="w-5 h-5 dark:hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>
</header>

<!-- Trip stats info card (shown when route renders successfully) -->
<div id="trip-card"
     class="fixed left-1/2 -translate-x-1/2 bottom-4 sm:bottom-6 z-[1000]
            w-[min(420px,calc(100vw-24px))]
            glass-card rounded-2xl p-4 sm:p-5
            flex-col gap-4 hidden">
  <div class="flex items-center gap-3">
    <div class="w-12 h-12 rounded-full bg-blue-500 ring-2 ring-white dark:ring-dark-700 shadow-card dark:shadow-card-dark flex items-center justify-center shrink-0">
      <svg class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="10" r="3"/>
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
      </svg>
    </div>
    <div class="min-w-0 flex-1">
      <div class="font-display font-semibold text-base leading-tight">Pinpoint Trip</div>
      <div id="trip-distance" class="font-body text-xs text-gray-500 dark:text-gray-400 mt-0.5">—</div>
    </div>
  </div>
  <a href="https://apps.apple.com/us/app/pinpoint-trip-tracker/id6749234913"
     class="cta-pill w-full glow-blue">
    <span>Open in Pinpoint</span>
    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="5" y1="12" x2="19" y2="12"/>
      <polyline points="12 5 19 12 12 19"/>
    </svg>
  </a>
</div>

<!-- Empty-state / no-route page (shown when ?route= is missing or invalid) -->
<div id="empty-state"
     class="fixed inset-0 z-[5] flex items-center justify-center p-6 hero-bg-pattern">
  <div class="max-w-md text-center">
    <!-- Hero glyph -->
    <div class="relative mx-auto mb-8 w-28 h-28">
      <div class="absolute inset-0 rounded-full bg-blue-500/10 dark:bg-blue-500/15 blur-2xl"></div>
      <div class="absolute inset-0 rounded-full bg-blue-500/20 dark:bg-blue-500/25 animate-ping"></div>
      <div class="relative w-full h-full rounded-full bg-gradient-to-br from-blue-500 to-blue-600 flex items-center justify-center shadow-elevated dark:shadow-elevated-dark">
        <div class="w-14 h-14 rounded-full bg-white dark:bg-dark-800 flex items-center justify-center">
          <svg class="w-7 h-7 text-blue-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="10" r="3"/>
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
          </svg>
        </div>
      </div>
    </div>

    <h1 id="empty-title" class="font-display font-bold text-3xl sm:text-4xl tracking-tight mb-3">Nothing to show here</h1>
    <p id="empty-message" class="font-body text-base text-gray-600 dark:text-gray-400 leading-relaxed mb-8">
      Trips and live shares from your friends open right here.<br/>Get Pinpoint to track and share your own.
    </p>

    <a href="https://apps.apple.com/us/app/pinpoint-trip-tracker/id6749234913"
       class="cta-pill glow-blue">
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
      <span>Download Pinpoint</span>
    </a>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/theme-toggle.js"></script>
<script src="js/route-viewer.js"></script>
</body>
</html>
