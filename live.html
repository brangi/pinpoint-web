<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#3B82F6" />
<title>Pinpoint — Live Share</title>

<!-- Set theme class before paint to avoid flash. Reads localStorage first, falls back to OS preference. -->
<script>
  (function () {
    try {
      var saved = localStorage.getItem('pinpoint-theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var dark = saved ? saved === 'dark' : prefersDark;
      if (dark) document.documentElement.classList.add('dark');
    } catch (_) {}
  })();
</script>

<link rel="icon" type="image/svg+xml" href="assets/logo.svg" />

<link rel="preconnect" href="https://api.fontshare.com" />
<link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

<link rel="stylesheet" href="dist/styles.css" />
</head>
<body class="hero-bg-pattern">

<!-- Full-bleed map -->
<div id="map" class="fixed inset-0 z-0"></div>

<!-- Top bar: logo (left) + dark-mode toggle (right) -->
<header class="fixed top-0 inset-x-0 z-[1000] flex items-center justify-between px-4 sm:px-6 pt-4 pointer-events-none">
  <a href="https://pinpointapp.me" class="pointer-events-auto inline-flex items-center gap-2 px-3 py-1.5 rounded-full glass-card">
    <img src="assets/logo.svg" alt="Pinpoint" class="h-6 w-6 dark:hidden" />
    <img src="assets/logo-white.svg" alt="Pinpoint" class="h-6 w-6 hidden dark:block" />
    <span class="font-display font-semibold text-sm tracking-tight">Pinpoint</span>
  </a>

  <button id="theme-toggle" aria-label="Toggle dark mode"
          class="pointer-events-auto w-10 h-10 rounded-full glass-card flex items-center justify-center text-gray-700 dark:text-gray-100 hover:scale-105 transition-transform">
    <!-- Sun (shown in dark mode) -->
    <svg class="w-5 h-5 hidden dark:block" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <!-- Moon (shown in light mode) -->
    <svg class="w-5 h-5 dark:hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>
</header>

<!-- Top status pill (Connecting / Live / Stale / Ended / Error) -->
<div id="status-banner"
     class="fixed top-20 left-1/2 -translate-x-1/2 z-[1000] hidden items-center gap-2 px-4 py-2 rounded-full glass-card text-sm font-medium">
  <span id="status-dot" class="status-dot is-live"></span>
  <span id="status-text">Connecting…</span>
</div>

<!-- Recenter FAB (shown only after the user pans away) -->
<button id="recenter-fab" aria-label="Recenter map"
        class="fixed bottom-44 right-4 sm:right-6 z-[1000] w-12 h-12 rounded-full glass-card flex items-center justify-center text-blue-500 hover:scale-105 transition-all opacity-0 pointer-events-none">
  <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/>
    <line x1="12" y1="2" x2="12" y2="6"/>
    <line x1="12" y1="18" x2="12" y2="22"/>
    <line x1="2" y1="12" x2="6" y2="12"/>
    <line x1="18" y1="12" x2="22" y2="12"/>
    <circle cx="12" cy="12" r="3" fill="currentColor"/>
  </svg>
</button>

<!-- Bottom info card -->
<div id="info-card"
     class="fixed left-1/2 -translate-x-1/2 bottom-4 sm:bottom-6 z-[1000]
            w-[min(420px,calc(100vw-24px))]
            glass-card rounded-2xl p-4 sm:p-5
            flex-col gap-4 hidden">

  <!-- Sharer row -->
  <div class="flex items-center gap-3">
    <!-- Avatar -->
    <div class="relative shrink-0">
      <div id="avatar-circle"
           class="w-12 h-12 rounded-full bg-blue-500 ring-2 ring-white dark:ring-dark-700 shadow-card dark:shadow-card-dark flex items-center justify-center overflow-hidden">
        <img id="avatar-img" alt="" referrerpolicy="no-referrer" loading="lazy"
             class="w-full h-full object-cover hidden" />
        <span id="avatar-initial" class="font-display font-semibold text-white text-lg">?</span>
      </div>
    </div>

    <!-- Name + freshness -->
    <div class="min-w-0 flex-1">
      <div id="sharer-name" class="font-display font-semibold text-base leading-tight truncate">Live Share</div>
      <div id="freshness-caption" class="font-body text-xs text-gray-500 dark:text-gray-400 mt-0.5">Connecting…</div>
    </div>

    <!-- Right side: countdown + battery -->
    <div class="flex flex-col items-end gap-1 shrink-0">
      <div id="countdown" class="font-body text-xs font-medium text-gray-700 dark:text-gray-300">—</div>
      <div id="battery-pill" class="hidden inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px] font-medium">
        <span id="battery-icon" aria-hidden="true">🔋</span>
        <span id="battery-percent">—</span>
      </div>
    </div>
  </div>

  <!-- Skeleton (Connecting state) -->
  <div id="card-skeleton" class="flex items-center gap-3 hidden">
    <div class="w-12 h-12 rounded-full skeleton"></div>
    <div class="flex-1 space-y-2">
      <div class="h-3 w-32 rounded skeleton"></div>
      <div class="h-2.5 w-20 rounded skeleton"></div>
    </div>
  </div>

  <!-- Battery low warning caption -->
  <div id="battery-warning" class="hidden text-xs text-brand-red font-medium">
    Battery low — share may end soon
  </div>

  <!-- Ended state caption (replaces sharer row's freshness when ended) -->
  <!-- (Updated inline by JS on ended state.) -->

  <!-- Primary CTA -->
  <a id="open-in-app" href="#" class="cta-pill w-full glow-blue">
    <span>Open in Pinpoint</span>
    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="5" y1="12" x2="19" y2="12"/>
      <polyline points="12 5 19 12 12 19"/>
    </svg>
  </a>
</div>

<!-- Invalid-link full-screen state -->
<div id="invalid-state"
     class="fixed inset-0 z-[1001] hidden items-center justify-center p-6 bg-white/95 dark:bg-dark-900/95 backdrop-blur-md">
  <div class="max-w-sm text-center">
    <div class="mb-6 flex justify-center">
      <div class="w-20 h-20 rounded-full bg-blue-500/10 dark:bg-blue-500/20 flex items-center justify-center">
        <svg class="w-10 h-10 text-blue-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
    </div>
    <h1 class="font-display font-bold text-2xl mb-2">This share isn't available</h1>
    <p class="text-gray-600 dark:text-gray-400 text-sm mb-6">The link is either invalid, expired, or the sharer has stopped sharing.</p>
    <a href="https://apps.apple.com/us/app/pinpoint-trip-tracker/id6749234913" class="cta-pill glow-blue">
      <span>Get Pinpoint</span>
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
    </a>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/mqtt@5.10.1/dist/mqtt.min.js"></script>
<script src="js/env-config.js"></script>
<script src="js/live-viewer.js"></script>
</body>
</html>
