<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#1E90FF" />
<title>Pinpoint — Live Share</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

<link rel="stylesheet" href="css/live.css" />
</head>
<body>

<div id="map"></div>

<div id="status-banner">
  <span id="status-dot"></span>
  <span class="status-text">Connecting…</span>
</div>

<div id="info-card">
  <div class="info-row">
    <div class="avatar">
      <img id="avatar-img" alt="" style="display:none" />
      <span id="avatar-initial">?</span>
    </div>
    <div>
      <div id="sharer-name" class="info-name">Live Share</div>
      <div id="countdown" class="info-meta">—</div>
    </div>
  </div>
  <a id="open-in-app" href="#">
    Open in Pinpoint
  </a>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/mqtt@5.10.1/dist/mqtt.min.js"></script>
<script src="js/env-config.js"></script>
<script src="js/live-viewer.js"></script>
</body>
</html>
